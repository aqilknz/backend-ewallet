    post:
      consumes:
      - application/json
      description: Authenticate user and get JWT token dengan pengecekan status PIN
      parameters:
      - description: login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
