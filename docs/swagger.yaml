            $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.Response-github_com_aqilknz_backend-ewallet_internal_dto_AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.Response-any'
      summary: Login a user
      tags:
      - auth
  /auth/check-email:
    post:
      consumes:
      - application/json
      description: verify email if exist for forgot password
      parameters:
      - description: check email payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.CheckEmailRequest'
      produces:
      - application/json
      responses:
