        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.Response-any'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.Response-any'
