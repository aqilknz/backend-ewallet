      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.Response-any'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.Response-any'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.Response-any'
      security:
      - ApiKeyAuth: []
      summary: Create user transaction PIN
      tags:
      - auth
  /auth/logout:
    delete:
      description: Invalidate current JWT token by adding it to Redis blacklist
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_aqilknz_backend-ewallet_internal_dto.Response-any'
      security:
      - ApiKeyAuth: []
      summary: Logout User
      tags:
      - auth
